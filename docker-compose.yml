version: "3.8"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: tqts_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: tqts_postgres
    environment:
      POSTGRES_DB: tqts
      POSTGRES_USER: tqts_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
